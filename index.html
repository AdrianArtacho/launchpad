<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Sample Rack</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <style>
    body {
      font-family: system-ui, sans-serif;
      background: #111;
      color: white;
      margin: 0;
      padding: 2rem;
    }

    header {
      display: flex;
      gap: 1rem;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 1rem;
    }

    h1 {
      font-size: 1.4rem;
      margin: 0;
    }

    #rack {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
      gap: 1rem;
    }

    button {
      border: none;
      border-radius: 16px;
      background: #2a2a2a;
      color: white;
      font-size: 0.9rem;
      padding: 1rem;
      cursor: pointer;
      box-shadow: 0 4px 12px #0008;
    }

    .pad {
      aspect-ratio: 1 / 1;
    }

    button:active,
    button.playing {
      background: #666;
      transform: scale(0.97);
    }

    #stopAll {
      aspect-ratio: auto;
      background: #5a1f1f;
      white-space: nowrap;
    }

    .error {
      color: #ff8080;
    }

    .info {
      color: #aaa;
      margin-bottom: 1rem;
      font-size: 0.85rem;
      overflow-wrap: anywhere;
    }
  </style>
</head>

<body>
  <header>
    <h1 id="title">Sample Rack</h1>
    <button id="stopAll">Stop all</button>
  </header>

  <div id="sourceInfo" class="info"></div>
  <div id="rack">Loading samples...</div>

  <script>
    const params = new URLSearchParams(window.location.search);

    /*
     * Default repository used when no ?repo= parameter is supplied.
     */
    const defaultRepositoryUrl =
      "https://github.com/AdrianArtacho/launchpad";

    const defaultBranch = "main";
    // const defaultFolder = "samples";
    const defaultFolder = "";

    const repositoryUrl =
      params.get("repo") || defaultRepositoryUrl;

    const branch =
      params.get("branch") || defaultBranch;

    const folder =
      params.get("folder") || defaultFolder;

    const rackTitle =
      params.get("title") || "Sample Rack";

    document.title = rackTitle;
    document.getElementById("title").textContent = rackTitle;

    const audioExtensions = [
      ".wav",
      ".mp3",
      ".ogg",
      ".m4a",
      ".flac",
      ".aiff",
      ".aif"
    ];

    const activeAudios = [];

    document
      .getElementById("stopAll")
      .addEventListener("click", stopAllSamples);

    function parseGitHubRepositoryUrl(url) {
      let parsedUrl;

      try {
        parsedUrl = new URL(url);
      } catch {
        throw new Error(`Invalid repository URL: ${url}`);
      }

      const hostname = parsedUrl.hostname.toLowerCase();

      if (
        hostname !== "github.com" &&
        hostname !== "www.github.com"
      ) {
        throw new Error(
          "The repository URL must be a public GitHub repository."
        );
      }

      const pathParts = parsedUrl.pathname
        .replace(/^\/+|\/+$/g, "")
        .split("/")
        .filter(Boolean);

      if (pathParts.length < 2) {
        throw new Error(
          "The GitHub URL must contain both an owner and a repository name."
        );
      }

      const owner = pathParts[0];
      const repo = pathParts[1].replace(/\.git$/i, "");

      const folder = pathParts
        .slice(2)
        .join("/");

      return {
        owner,
        repo,
        folder
      };
    }

    function encodeRepositoryPath(path) {
      return path
        .split("/")
        .filter(Boolean)
        .map(segment => encodeURIComponent(segment))
        .join("/");
    }

    function stopAllSamples() {
      activeAudios.forEach(audio => {
        audio.pause();
        audio.currentTime = 0;
      });

      document
        .querySelectorAll(".playing")
        .forEach(button => {
          button.classList.remove("playing");
        });
    }

    async function requestFullscreenOnce() {
      try {
        if (!document.fullscreenElement) {
          await document.documentElement.requestFullscreen();
        }
      } catch {
        /*
         * Some browsers deny fullscreen or do not support it.
         */
      }
    }

    async function loadSamples() {
      const rack = document.getElementById("rack");
      const sourceInfo = document.getElementById("sourceInfo");

      try {
        const {
          owner,
          repo,
          folder: repositoryFolder
        } = parseGitHubRepositoryUrl(repositoryUrl);

        const requestedFolder =
          params.has("folder")
            ? params.get("folder")
            : repositoryFolder;

        const samplesPath =
          encodeRepositoryPath(requestedFolder);

        const encodedBranch =
          encodeURIComponent(branch);

        const apiUrl = samplesPath
          ? `https://api.github.com/repos/${owner}/${repo}/contents/${samplesPath}?ref=${encodedBranch}`
          : `https://api.github.com/repos/${owner}/${repo}/contents?ref=${encodedBranch}`;

        sourceInfo.textContent =
          `${owner}/${repo} · ${folder || "/"} · ${branch}`;

        const response = await fetch(apiUrl, {
          headers: {
            Accept: "application/vnd.github+json"
          }
        });

        if (!response.ok) {
          if (response.status === 404) {
            throw new Error(
              `Could not find "${folder}" in ${owner}/${repo} on branch "${branch}".`
            );
          }

          if (response.status === 403) {
            throw new Error(
              "GitHub API request limit reached. Please try again later."
            );
          }

          throw new Error(
            `GitHub returned error ${response.status}.`
          );
        }

        const files = await response.json();

        if (!Array.isArray(files)) {
          throw new Error(
            `"${folder}" is not a folder.`
          );
        }

        const samples = files
          .filter(file =>
            file.type === "file" &&
            audioExtensions.some(extension =>
              file.name
                .toLowerCase()
                .endsWith(extension)
            )
          )
          .sort((a, b) =>
            a.name.localeCompare(
              b.name,
              undefined,
              {
                numeric: true,
                sensitivity: "base"
              }
            )
          );

        rack.innerHTML = "";

        if (samples.length === 0) {
          rack.innerHTML =
            `<p>No supported audio files found in ${folder || "/"}.</p>`;
          return;
        }

        samples.forEach(file => {
          const label = decodeURIComponent(
            file.name.replace(/\.[^/.]+$/, "")
          );

          const audio = new Audio(file.download_url);
          audio.preload = "auto";

          activeAudios.push(audio);

          const button =
            document.createElement("button");

          button.className = "pad";
          button.textContent = label;

          button.addEventListener("click", async () => {
            await requestFullscreenOnce();

            audio.currentTime = 0;

            try {
              await audio.play();
              button.classList.add("playing");
            } catch (error) {
              console.error(
                `Could not play ${file.name}:`,
                error
              );
            }
          });

          audio.addEventListener("ended", () => {
            button.classList.remove("playing");
          });

          audio.addEventListener("pause", () => {
            if (audio.currentTime === 0) {
              button.classList.remove("playing");
            }
          });

          rack.appendChild(button);
        });

      } catch (error) {
        sourceInfo.textContent = "";
        rack.innerHTML =
          `<p class="error">${error.message}</p>`;
      }
    }

    loadSamples();
  </script>
</body>
</html>
